<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — ЦифроПомощник</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ЦифроПомощник" class="logo">
                <span class="logo-text">ЦифроПомощник</span>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="index.html#courses">Курсы</a>
                <a href="register.html" class="active">Профиль</a>
                <a href="lesson.html">Уроки</a>
            </nav>
            <a href="register.html" class="btn-login">ВОЙТИ</a>
        </div>
    </header>

    <!-- Личный кабинет -->
    <section class="cabinet-banner">
        <div class="container">
            <h1>Личный кабинет</h1>
            <p>Добро пожаловать! Вы еще не авторизованы.<br>Для доступа к курсам необходимо войти или создать аккаунт.</p>
        </div>
    </section>

    <!-- Форма регистрации -->
    <section class="register-section">
        <div class="container">
            <h2 class="register-title">Регистрация</h2>
            <form class="register-form">
                <input type="text" placeholder="Введите ФИО" required>
                <input type="email" placeholder="Ваш E-Mail" required>
                <input type="password" placeholder="Пароль" required>
                <input type="password" placeholder="Подтвердите пароль" required>

                <div class="radio-group">
                    <span>Я:</span>
                    <label><input type="radio" name="role" value="school"> Школьник</label>
                    <label><input type="radio" name="role" value="student" checked> Студент</label>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" required>
                    Согласен с условиями использования
                </label>

                <button type="submit" class="btn-register">Зарегистрироваться</button>

                <p class="login-link">Уже есть аккаунт? <a href="#">Войти</a></p>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ЦифроПомощник" class="logo-small">
                <span class="logo-text-white">ЦифроПомощник</span>
            </div>
            <p class="copyright">©2026. Все права защищены.</p>
        </div>
    </footer>

</body>
</html>
