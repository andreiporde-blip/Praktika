<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ЦифроПомощник</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ЦифроПомощник" class="logo">
                <span class="logo-text">ЦифроПомощник</span>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="courses.html">Курсы</a>
                <a href="register.html">Профиль</a>
                <a href="lesson.html">Уроки</a>
            </nav>
            <a href="login.html" class="btn-login active">ВОЙТИ</a>
        </div>
    </header>

    <section class="cabinet-banner">
        <div class="container">
            <h1>Вход в личный кабинет</h1>
            <p>Введите свои данные для доступа к курсам</p>
        </div>
    </section>

    <section class="register-section">
        <div class="container">
            <h2 class="register-title">Вход</h2>
            <form class="register-form">
                <input type="email" placeholder="Ваш E-Mail" required>
                <input type="password" placeholder="Пароль" required>

                <label class="checkbox-label">
                    <input type="checkbox">
                    Запомнить меня
                </label>

                <button type="submit" class="btn-register">Войти</button>

                <p class="login-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                <p class="login-link"><a href="#">Забыли пароль?</a></p>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ЦифроПомощник" class="logo-small">
                <span class="logo-text-white">ЦифроПомощник</span>
            </div>
            <p class="copyright">©2026. Все права защищены.</p>
        </div>
    </footer>

</body>
</html>
